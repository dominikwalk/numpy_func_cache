name: tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  main:
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      run: |
        python -m pip install --upgrade pip
        pip install uv
    - name: Run Pytest via shared matrix runner
      shell: bash
      run: |
        ./scripts/run_pytest_matrix.sh single "${{ matrix.python-version }}"
